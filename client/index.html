<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="1SOL Warehouse" />
    <meta name="theme-color" content="#0f172a" />
    <title>1SOL.AI - Logistics Operations Platform for Shopify Merchants</title>
    <meta name="description" content="All-in-one logistics operations dashboard for Shopify merchants in Pakistan. Track shipments, manage couriers, reconcile COD payments, and scale your e-commerce business." />
    <meta name="keywords" content="shopify, logistics, courier tracking, COD, Pakistan, e-commerce, shipment management" />
    <meta property="og:title" content="1SOL.AI - Logistics Operations Platform" />
    <meta property="og:description" content="Streamline your e-commerce logistics with real-time tracking, multi-courier support, and COD reconciliation." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function(){var t=localStorage.getItem('shipflow-theme')||'light';if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.classList.add(t)})();
    </script>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--background,#fff)">
        <div style="width:48px;height:48px;border-radius:8px;background:#3b82f6;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite">
          <svg style="width:28px;height:28px;color:#fff" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
